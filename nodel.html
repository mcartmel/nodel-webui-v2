<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nodel</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <nodel-app>
      <nodel-toolbar icon-src="./v2/img/logo.png">
        <nodel-theme-toggle></nodel-theme-toggle>
      </nodel-toolbar>

      <nodel-page title="Activity">
        <nodel-row>
          <nodel-column>
            <nodel-description></nodel-description>
          </nodel-column>
        </nodel-row>
        <nodel-row>
          <nodel-column>
            <nodel-collapse label="Console" preview="No console output yet">
              <nodel-console collapse-preview="last-line"></nodel-console>
            </nodel-collapse>
          </nodel-column>
        </nodel-row>
        <nodel-row>
          <nodel-column>
            <nodel-collapse label="Recipe">
              <nodel-editor></nodel-editor>
            </nodel-collapse>
          </nodel-column>
        </nodel-row>
        <nodel-row>
          <nodel-column md="4">
            <nodel-text><b>Log</b></nodel-text>
            <nodel-log></nodel-log>
          </nodel-column>
        </nodel-row>
      </nodel-page>
    </nodel-app>
  </body>
</html>
