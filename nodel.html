<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nodel</title>
    <script>
      (() => {
        const root = document.documentElement;
        let theme = root.dataset.theme;
        if (theme !== 'light' && theme !== 'dark') {
          try {
            const stored = window.localStorage.getItem('nodel.theme');
            theme = stored === 'light' || stored === 'dark' ? stored : undefined;
          } catch {}
        }
        if (theme !== 'light' && theme !== 'dark') {
          try {
            theme = typeof window.matchMedia === 'function' && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } catch {
            theme = 'light';
          }
        }
        root.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <nodel-app>
      <nodel-toolbar icon-src="./v2/img/logo.png">
        <nodel-node-menu></nodel-node-menu>
      </nodel-toolbar>

      <nodel-page title="Activity">
        <nodel-title level="1">Activity</nodel-title>
        <nodel-row>
          <nodel-column>
            <nodel-description></nodel-description>
          </nodel-column>
        </nodel-row>
        <nodel-row>
          <nodel-column>
            <nodel-collapse label="Console" preview="No console output yet">
              <nodel-console collapse-preview="last-line"></nodel-console>
            </nodel-collapse>
          </nodel-column>
        </nodel-row>
        <nodel-row>
          <nodel-column>
            <nodel-collapse label="Recipe">
              <nodel-editor></nodel-editor>
            </nodel-collapse>
          </nodel-column>
        </nodel-row>
        <nodel-row>
          <nodel-column md="8">
            <nodel-title level="2">Actions &amp; Signals</nodel-title>
            <nodel-actsig></nodel-actsig>
          </nodel-column>
          <nodel-column md="4">
            <nodel-title level="2">Log</nodel-title>
            <nodel-log></nodel-log>
          </nodel-column>
        </nodel-row>
      </nodel-page>

      <nodel-page title="Config">
        <nodel-title level="1">Config</nodel-title>
        <nodel-row>
          <nodel-column>
            <nodel-collapse label="Parameters">
              <nodel-params></nodel-params>
            </nodel-collapse>
          </nodel-column>
        </nodel-row>
        <nodel-row>
          <nodel-column>
            <nodel-title level="2">Bindings</nodel-title>
            <nodel-bindings></nodel-bindings>
          </nodel-column>
        </nodel-row>
      </nodel-page>
    </nodel-app>
  </body>
</html>
