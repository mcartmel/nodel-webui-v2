<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nodel</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <nodel-app>
      <nodel-toolbar icon-src="./v2/img/logo.png">
        <nodel-theme-toggle></nodel-theme-toggle>
      </nodel-toolbar>

      <nodel-page title="Activity">
        <nodel-row>
          <nodel-column>
            <nodel-text>Console</nodel-text>
            <nodel-console></nodel-console>
          </nodel-column>
        </nodel-row>
        <nodel-row>
          <nodel-column span="4">
            <nodel-text>Log</nodel-text>
            <nodel-log></nodel-log>
          </nodel-column>
        </nodel-row>
      </nodel-page>
    </nodel-app>
  </body>
</html>
