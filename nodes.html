<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nodes</title>
    <script>
      (() => {
        const root = document.documentElement;
        let theme = root.dataset.theme;
        if (theme !== 'light' && theme !== 'dark') {
          try {
            const stored = window.localStorage.getItem('nodel.theme');
            theme = stored === 'light' || stored === 'dark' ? stored : undefined;
          } catch {}
        }
        if (theme !== 'light' && theme !== 'dark') {
          try {
            theme = typeof window.matchMedia === 'function' && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } catch {
            theme = 'light';
          }
        }
        root.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <nodel-app>
      <nodel-toolbar icon-src="./v2/img/logo.png">
        <nodel-theme-toggle></nodel-theme-toggle>
      </nodel-toolbar>

      <nodel-page title="Locals">
        <nodel-title level="1">Local nodes</nodel-title>
        <nodel-row>
          <nodel-column>
            <nodel-add-node redirect="false"></nodel-add-node>
          </nodel-column>
        </nodel-row>
        <nodel-row>
          <nodel-column>
            <nodel-node-list scope="local"></nodel-node-list>
          </nodel-column>
        </nodel-row>
      </nodel-page>

      <nodel-page title="Network">
        <nodel-title level="1">Network nodes</nodel-title>
        <nodel-row>
          <nodel-column>
            <nodel-node-list scope="network"></nodel-node-list>
          </nodel-column>
        </nodel-row>
      </nodel-page>

      <nodel-page title="Diagnostics">
        <nodel-title level="1">Diagnostics</nodel-title>
        <nodel-row>
          <nodel-column>
            <nodel-diagnostics></nodel-diagnostics>
          </nodel-column>
        </nodel-row>
        <nodel-row>
          <nodel-column>
            <nodel-collapse label="Host log" preview="No host log entries yet">
              <nodel-host-log></nodel-host-log>
            </nodel-collapse>
          </nodel-column>
        </nodel-row>
        <nodel-row>
          <nodel-column>
            <nodel-collapse label="Charts" preview="Select categories to show charts">
              <nodel-diagnostic-charts></nodel-diagnostic-charts>
            </nodel-collapse>
          </nodel-column>
        </nodel-row>
      </nodel-page>
    </nodel-app>
  </body>
</html>
